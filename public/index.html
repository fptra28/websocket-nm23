<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market Stream Demo</title>
    <style>
      :root {
        --bg: #efe8dc;
        --panel: #fffaf2;
        --text: #1f1b17;
        --muted: #6b6258;
        --accent: #0e7490;
        --accent-strong: #155e75;
        --line: #d8cab8;
        --up: #166534;
        --down: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(14, 116, 144, 0.16), transparent 28%),
          linear-gradient(135deg, #f5efe6, var(--bg));
        padding: 24px;
      }

      .app {
        width: min(1040px, 100%);
        margin: 0 auto;
        background: rgba(255, 250, 242, 0.92);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 24px 70px rgba(31, 27, 23, 0.12);
        overflow: hidden;
      }

      .hero {
        padding: 28px 28px 18px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 18px 28px;
        align-items: center;
        border-bottom: 1px solid var(--line);
      }

      select,
      button {
        border-radius: 14px;
        border: 1px solid var(--line);
        padding: 12px 14px;
        font: inherit;
        background: white;
      }

      button {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: white;
        border: 0;
        cursor: pointer;
      }

      .meta {
        display: grid;
        gap: 6px;
        padding: 0 28px 18px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .table-wrap {
        overflow-x: auto;
        padding: 0 20px 20px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 760px;
      }

      th,
      td {
        padding: 14px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
      }

      th {
        font-size: 0.85rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }

      tbody tr:hover {
        background: rgba(14, 116, 144, 0.04);
      }

      .up {
        color: var(--up);
        font-weight: 600;
      }

      .down {
        color: var(--down);
        font-weight: 600;
      }

      .error {
        color: var(--down);
        font-style: italic;
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .hero,
        .controls,
        .meta {
          padding-left: 18px;
          padding-right: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <h1>IDX Market Stream</h1>
        <p>Demo data market dengan dua mode konsumsi: WebSocket dan polling HTTP.</p>
      </section>

      <section class="controls">
        <label for="mode-select">Mode</label>
        <select id="mode-select">
          <option value="websocket">WebSocket</option>
          <option value="polling">Polling</option>
        </select>
        <button id="refresh-button" type="button">Refresh Sekarang</button>
      </section>

      <section class="meta">
        <div id="status">Status: menyiapkan koneksi...</div>
        <div id="endpoint">Endpoint: -</div>
        <div id="updated-at">Update terakhir: -</div>
      </section>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Price</th>
              <th>Change</th>
              <th>Change %</th>
              <th>High</th>
              <th>Low</th>
            </tr>
          </thead>
          <tbody id="market-body"></tbody>
        </table>
      </div>
    </main>

    <script>
      const modeSelect = document.getElementById("mode-select");
      const refreshButton = document.getElementById("refresh-button");
      const statusElement = document.getElementById("status");
      const endpointElement = document.getElementById("endpoint");
      const updatedAtElement = document.getElementById("updated-at");
      const marketBody = document.getElementById("market-body");

      let marketInfo = null;
      let socket = null;
      let pollingTimer = null;

      function formatNumber(value) {
        if (typeof value !== "number" || Number.isNaN(value)) {
          return "-";
        }

        return new Intl.NumberFormat("id-ID", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }).format(value);
      }

      function formatTime(value) {
        if (!value) {
          return "-";
        }

        return new Date(value).toLocaleTimeString("id-ID", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
      }

      function setStatus(text) {
        statusElement.textContent = `Status: ${text}`;
      }

      function setEndpoint(text) {
        endpointElement.textContent = `Endpoint: ${text}`;
      }

      function renderRows(payload) {
        marketBody.innerHTML = "";
        updatedAtElement.textContent = `Update terakhir: ${formatTime(payload.at)}`;

        for (const item of payload.data || []) {
          const row = document.createElement("tr");

          if (item.error) {
            row.innerHTML = `
              <td>${item.symbol}</td>
              <td colspan="5" class="error">${item.message || "Gagal mengambil data"}</td>
            `;
            marketBody.appendChild(row);
            continue;
          }

          const changeClass = item.change > 0 ? "up" : item.change < 0 ? "down" : "";
          const changePrefix = item.change > 0 ? "+" : "";

          row.innerHTML = `
            <td>${item.symbol}</td>
            <td>${formatNumber(item.price)}</td>
            <td class="${changeClass}">${changePrefix}${formatNumber(item.change)}</td>
            <td class="${changeClass}">${changePrefix}${formatNumber(item.change_percent)}%</td>
            <td>${formatNumber(item.high)}</td>
            <td>${formatNumber(item.low)}</td>
          `;

          marketBody.appendChild(row);
        }
      }

      function stopRealtime() {
        if (socket) {
          socket.close();
          socket = null;
        }

        if (pollingTimer) {
          clearInterval(pollingTimer);
          pollingTimer = null;
        }
      }

      async function loadMarketByPolling() {
        const response = await fetch("/api/market");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const payload = await response.json();
        renderRows(payload);
        setStatus(`polling aktif tiap ${marketInfo.interval_ms / 1000} detik`);
        setEndpoint("/api/market");
      }

      function startPolling() {
        stopRealtime();
        void loadMarketByPolling().catch((error) => {
          setStatus(`polling gagal: ${error.message}`);
        });

        pollingTimer = window.setInterval(() => {
          void loadMarketByPolling().catch((error) => {
            setStatus(`polling gagal: ${error.message}`);
          });
        }, marketInfo.interval_ms);
      }

      function startWebSocket() {
        stopRealtime();

        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const wsUrl = `${protocol}://${window.location.host}`;
        socket = new WebSocket(wsUrl);

        setStatus("menghubungkan websocket...");
        setEndpoint(wsUrl);

        socket.addEventListener("open", () => {
          setStatus("websocket terhubung");
        });

        socket.addEventListener("close", () => {
          if (modeSelect.value === "websocket") {
            setStatus("websocket terputus");
          }
        });

        socket.addEventListener("message", (event) => {
          const payload = JSON.parse(event.data);

          if (payload.type === "info") {
            setStatus(`websocket terhubung, interval ${payload.interval_ms / 1000} detik`);
            return;
          }

          if (payload.type === "market") {
            renderRows(payload);
          }
        });
      }

      function activateMode() {
        if (modeSelect.value === "polling") {
          startPolling();
          return;
        }

        startWebSocket();
      }

      async function bootstrap() {
        const response = await fetch("/api/info");
        marketInfo = await response.json();
        activateMode();
      }

      modeSelect.addEventListener("change", activateMode);

      refreshButton.addEventListener("click", () => {
        if (modeSelect.value !== "polling") {
          setStatus("refresh manual hanya dipakai saat mode polling");
          return;
        }

        void loadMarketByPolling().catch((error) => {
          setStatus(`polling gagal: ${error.message}`);
        });
      });

      void bootstrap().catch((error) => {
        setStatus(`gagal inisialisasi: ${error.message}`);
      });
    </script>
  </body>
</html>
