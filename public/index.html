<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node.js WebSocket Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe8;
        --panel: #fffaf4;
        --text: #1f1a17;
        --muted: #786d63;
        --accent: #0f766e;
        --accent-2: #164e63;
        --border: #dccfc2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 30%),
          linear-gradient(135deg, var(--bg), #efe5d8);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .app {
        width: min(720px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(31, 26, 23, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        margin-bottom: 16px;
      }

      input,
      button {
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 14px 16px;
        font: inherit;
      }

      input:focus {
        outline: 2px solid rgba(15, 118, 110, 0.25);
        border-color: var(--accent);
      }

      button {
        cursor: pointer;
        color: white;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        border: 0;
        min-width: 120px;
      }

      .status {
        margin-bottom: 16px;
        font-size: 0.95rem;
      }

      .messages {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 10px;
      }

      .messages li {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.72);
      }

      .meta {
        display: block;
        color: var(--muted);
        font-size: 0.82rem;
        margin-bottom: 4px;
      }

      @media (max-width: 640px) {
        form {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>WebSocket Node.js</h1>
      <p>Ketik pesan untuk menguji koneksi real-time antara browser dan server.</p>

      <div class="status" id="status">Status: menghubungkan...</div>

      <form id="message-form">
        <input
          id="message-input"
          type="text"
          placeholder="Tulis pesan..."
          autocomplete="off"
          required
        />
        <button type="submit">Kirim</button>
      </form>

      <ul class="messages" id="messages"></ul>
    </main>

    <script>
      const statusElement = document.getElementById("status");
      const form = document.getElementById("message-form");
      const input = document.getElementById("message-input");
      const messages = document.getElementById("messages");

      const protocol = window.location.protocol === "https:" ? "wss" : "ws";
      const socket = new WebSocket(`${protocol}://${window.location.host}`);

      function addMessage(data) {
        const item = document.createElement("li");
        const meta = document.createElement("span");
        const text = document.createElement("span");

        const sentAt = new Date(data.at).toLocaleTimeString("id-ID", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });

        meta.className = "meta";
        meta.textContent = `${data.type} • ${sentAt}`;
        text.textContent = data.message;

        item.append(meta, text);
        messages.prepend(item);
      }

      socket.addEventListener("open", () => {
        statusElement.textContent = "Status: terhubung";
      });

      socket.addEventListener("close", () => {
        statusElement.textContent = "Status: koneksi terputus";
      });

      socket.addEventListener("message", (event) => {
        const data = JSON.parse(event.data);
        addMessage(data);
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const message = input.value.trim();
        if (!message || socket.readyState !== WebSocket.OPEN) {
          return;
        }

        socket.send(message);
        input.value = "";
        input.focus();
      });
    </script>
  </body>
</html>
